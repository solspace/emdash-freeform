name: Publish freeform to EmDash plugin registry

# Triggers on version tags scoped to freeform, e.g.
#   git tag freeform/v0.1.0 && git push origin freeform/v0.1.0
on:
  push:
    tags:
      - "freeform/v*"

jobs:
  publish:
    name: Bundle and publish to registry
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#freeform/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tarball=freeform-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build and bundle plugin
        working-directory: freeform
        run: pnpm run bundle

      - name: Create GitHub release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: freeform ${{ steps.version.outputs.version }}
          files: freeform/dist/${{ steps.version.outputs.tarball }}
          make_latest: true

      - name: Restore registry publisher session
        env:
          EMDASH_PLUGIN_OAUTH_SESSIONS: ${{ secrets.EMDASH_PLUGIN_OAUTH_SESSIONS }}
        run: |
          mkdir -p ~/.emdash/oauth
          printf '%s' "$EMDASH_PLUGIN_OAUTH_SESSIONS" > ~/.emdash/oauth/sessions.json

      - name: Publish release record to registry
        working-directory: freeform
        env:
          EMDASH_REGISTRY_URL: https://registry.emdashcms.com
        run: |
          TARBALL="dist/${{ steps.version.outputs.tarball }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.version.outputs.tarball }}"
          if [ -n "${{ secrets.REGISTRY_TARBALL_URL }}" ]; then
            URL="${{ secrets.REGISTRY_TARBALL_URL }}"
          fi
          pnpm exec emdash-plugin publish --url "$URL" --local "$TARBALL"
