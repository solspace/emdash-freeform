name: Publish freeform to EmDash plugin registry

# Triggers on version tags scoped to freeform, e.g.
#   git tag freeform/v0.1.0 && git push origin freeform/v0.1.0
on:
  push:
    tags:
      - "freeform/v*"

jobs:
  publish:
    name: Bundle and publish to registry
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#freeform/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tarball=freeform-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build and bundle plugin
        working-directory: freeform
        run: pnpm run bundle

      - name: Verify bundle version matches tag
        working-directory: freeform
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TARBALL="dist/freeform-${TAG_VERSION}.tar.gz"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag is freeform/v${TAG_VERSION} but freeform/package.json is ${PKG_VERSION}. Bump package.json and src/index.ts before tagging."
            exit 1
          fi
          if [ ! -f "$TARBALL" ]; then
            echo "::error::Expected ${TARBALL} after bundle."
            ls -la dist/ 2>/dev/null || echo "(no dist/ directory)"
            exit 1
          fi

      - name: Create GitHub release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: freeform ${{ steps.version.outputs.version }}
          files: freeform/dist/${{ steps.version.outputs.tarball }}
          make_latest: true

      - name: Restore registry publisher session
        env:
          EMDASH_PLUGIN_OAUTH_SESSIONS: ${{ secrets.EMDASH_PLUGIN_OAUTH_SESSIONS }}
        run: |
          if [ -z "$EMDASH_PLUGIN_OAUTH_SESSIONS" ]; then
            echo "EMDASH_PLUGIN_OAUTH_SESSIONS secret is empty or missing." >&2
            exit 1
          fi

          mkdir -p ~/.emdash/oauth ~/.emdash
          printf '%s' "$EMDASH_PLUGIN_OAUTH_SESSIONS" > ~/.emdash/oauth/sessions.json

          # publish reads identity from ~/.emdash/credentials.json; OAuth tokens
          # live in ~/.emdash/oauth/sessions.json (restored above).
          DID=$(jq -er '(.entries | keys)[0]' ~/.emdash/oauth/sessions.json)
          PDS=$(jq -er --arg did "$DID" '.entries[$did].tokenSet.aud' ~/.emdash/oauth/sessions.json)
          UPDATED_AT=$(($(date +%s) * 1000))
          jq -n \
            --arg did "$DID" \
            --arg pds "$PDS" \
            --argjson updatedAt "$UPDATED_AT" \
            '{
              version: 1,
              currentDid: $did,
              sessions: {
                ($did): {
                  did: $did,
                  handle: null,
                  pds: $pds,
                  updatedAt: $updatedAt
                }
              }
            }' > ~/.emdash/credentials.json

      # Private GitHub release assets return 404 without auth. The registry
      # must fetch the tarball from a public HTTPS URL, so we mirror to npm
      # and register a jsDelivr/unpkg URL (repo can stay private).
      - name: Publish plugin tarball to npm (public CDN)
        id: npm_dist
        working-directory: freeform
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="${{ steps.version.outputs.tarball }}"
          DIST_DIR=".registry-dist"
          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"
          cp "dist/$TARBALL" "$DIST_DIR/"
          cat > "$DIST_DIR/package.json" <<EOF
          {
            "name": "@solspace/freeform-plugin-dist",
            "version": "${VERSION}",
            "description": "EmDash plugin tarball for freeform@${VERSION} (registry distribution only)",
            "license": "MIT",
            "files": ["${TARBALL}"]
          }
          EOF

          if npm view "@solspace/freeform-plugin-dist@${VERSION}" version >/dev/null 2>&1; then
            echo "@solspace/freeform-plugin-dist@${VERSION} already on npm; skipping publish."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          else
            npm publish "$DIST_DIR" --access public
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release record to registry
        working-directory: freeform
        env:
          EMDASH_REGISTRY_URL: https://registry.emdashcms.com
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_FILE="${{ steps.version.outputs.tarball }}"
          TARBALL="dist/${TARBALL_FILE}"
          CDN_URLS=(
            "https://cdn.jsdelivr.net/npm/@solspace/freeform-plugin-dist@${VERSION}/${TARBALL_FILE}"
            "https://unpkg.com/@solspace/freeform-plugin-dist@${VERSION}/${TARBALL_FILE}"
          )

          if [ -n "${{ secrets.REGISTRY_TARBALL_URL }}" ]; then
            URL="${{ secrets.REGISTRY_TARBALL_URL }}"
          else
            URL=""
            # CDNs can lag npm by several minutes; try jsDelivr first, then unpkg.
            for attempt in $(seq 1 60); do
              for candidate in "${CDN_URLS[@]}"; do
                if curl -fsS --retry 2 --retry-delay 3 "$candidate" -o /dev/null; then
                  URL="$candidate"
                  echo "Tarball reachable at $URL (attempt $attempt)."
                  break 2
                fi
              done
              echo "Waiting for npm CDN (attempt ${attempt}/60)..."
              sleep 10
            done
            if [ -z "$URL" ]; then
              echo "::error::Tarball not reachable on jsDelivr or unpkg yet. npm publish succeeded; re-run this workflow in a few minutes."
              exit 1
            fi
          fi

          echo "Registry tarball URL: $URL"
          if [ "${{ steps.npm_dist.outputs.fresh }}" = "true" ]; then
            LOCAL_SHA=$(sha256sum "$TARBALL" | awk '{print $1}')
            REMOTE_SHA=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
            if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
              echo "::error::CDN tarball differs from this build right after npm publish."
              exit 1
            fi
            pnpm exec emdash-plugin publish --url "$URL" --local "$TARBALL"
          else
            echo "npm version already published; registering CDN tarball (re-run safe)."
            pnpm exec emdash-plugin publish --url "$URL"
          fi
