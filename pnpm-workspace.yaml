packages:
  - "freeform-plugin"
  - "freeform-astro"
  - "emdash-freeform-mcp"
  - "emdash-app"

# Native binary builds required by emdash-app
allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true

onlyBuiltDependencies:
  - "esbuild"
  - "workerd"

patchedDependencies:
  '@emdash-cms/blocks@0.12.0': patches/@emdash-cms__blocks@0.12.0.patch
